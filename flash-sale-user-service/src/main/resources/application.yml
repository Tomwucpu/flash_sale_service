server:
  port: ${APP_PORT:9001}

spring:
  application:
    name: flash-sale-user-service
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${MYSQL_HOST:127.0.0.1}:${MYSQL_PORT:3306}/flash_sale?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai
    username: ${MYSQL_USERNAME:flashsale}
    password: ${MYSQL_PASSWORD:flashsale123}
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_SERVER_ADDR:127.0.0.1:8848}
        namespace: ${NACOS_NAMESPACE:public}
        enabled: ${NACOS_DISCOVERY_ENABLED:false}
  jackson:
    time-zone: Asia/Shanghai

management:
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  file:
    name: logs/${spring.application.name}.log
  pattern:
    level: "%5p [${spring.application.name:unknown},%X{requestId:-}]"

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true

flash-sale:
  security:
    jwt-secret: ${FLASH_SALE_JWT_SECRET:replace-with-a-32-char-secret}
