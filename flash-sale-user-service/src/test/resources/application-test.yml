spring:
  cloud:
    nacos:
      discovery:
        enabled: false
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:mem:flash_sale_user;MODE=MySQL;DB_CLOSE_DELAY=-1;DATABASE_TO_UPPER=false;NON_KEYWORDS=USER
    username: sa
    password:
  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql

flash-sale:
  security:
    jwt-secret: 0123456789abcdef0123456789abcdef
    access-token-ttl: 2h
